{% extends "base.html" %}

{% block title %}新增食材{% endblock %}

{% block extra_head %}
<style>
    .nutrition-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
    }
    @media (max-width: 768px) {
        .nutrition-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-plus-circle text-success me-2"></i>新增食材
        </h4>
        <a href="{{ url_for('ingredients_page') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>返回食材库
        </a>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <!-- 基本信息 -->
        <div class="card mb-3">
            <div class="card-header bg-white fw-bold">基本信息</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">食材名称 <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" placeholder="如：鸡腿肉" required>
                </div>
                <div class="mb-0">
                    <label class="form-label">分类</label>
                    <select name="category" class="form-select">
                        <option value="蔬菜">蔬菜</option>
                        <option value="肉类">肉类</option>
                        <option value="水产">水产</option>
                        <option value="蛋类">蛋类</option>
                        <option value="豆制品">豆制品</option>
                        <option value="谷物">谷物</option>
                        <option value="水果">水果</option>
                        <option value="奶类">奶类</option>
                        <option value="坚果">坚果</option>
                        <option value="菌菇">菌菇</option>
                        <option value="调味品">调味品</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 营养成分（每100g） -->
        <div class="card mb-3">
            <div class="card-header bg-white fw-bold">营养成分（每100g）</div>
            <div class="card-body">
                <div class="nutrition-grid">
                    <div>
                        <label class="form-label small text-muted">热量 (kcal)</label>
                        <input type="number" name="calories" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">蛋白质 (g)</label>
                        <input type="number" name="protein" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">脂肪 (g)</label>
                        <input type="number" name="fat" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">碳水 (g)</label>
                        <input type="number" name="carbs" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">纤维 (g)</label>
                        <input type="number" name="fiber" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">维生素A (μg)</label>
                        <input type="number" name="vitamin_a" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">维生素C (mg)</label>
                        <input type="number" name="vitamin_c" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">钙 (mg)</label>
                        <input type="number" name="calcium" class="form-control" step="0.1" value="0" min="0">
                    </div>
                    <div>
                        <label class="form-label small text-muted">铁 (mg)</label>
                        <input type="number" name="iron" class="form-control" step="0.1" value="0" min="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-lg me-1"></i>保存食材
            </button>
            <a href="{{ url_for('ingredients_page') }}" class="btn btn-outline-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
